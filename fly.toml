app = 'bandpass'
primary_region = 'sjc'

[build]

[env]
  ENABLE_AUDIO_ANALYSIS = "true"
  ANALYZER_CONCURRENCY = "2"
  DB_POOL_SIZE = "5"

[processes]
  web = "node server.js"
  worker = "node worker/main.js"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ["web"]

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  processes = ["web"]

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  processes = ["worker"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "120s"
    method = "GET"
    path = "/"

[[restart]]
  policy = "always"
  processes = ["worker"]

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2
  processes = ["worker"]
